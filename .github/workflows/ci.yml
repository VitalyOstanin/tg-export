name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `id-token: write` is required for the Codecov OIDC upload below.
    # `contents: read` repeats the workflow-level default explicitly, since
    # adding any job-level `permissions:` block resets all unspecified scopes
    # to none.
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright

      - name: Run tests with coverage
        run: uv run python -m pytest --cov=tg_export --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        # Run on a single matrix entry — uploading the same report three
        # times under different Python versions just creates noise on the
        # Codecov side without changing what we measure.
        if: matrix.python-version == '3.12'
        # codecov/codecov-action pinned to v6.0.0
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          # OIDC removes the need for a long-lived CODECOV_TOKEN secret —
          # the action exchanges a short-lived GitHub-issued JWT for an
          # upload credential, which Codecov verifies by repository claim.
          use_oidc: true
          files: ./coverage.xml
          flags: unit
          # Don't fail the build on Codecov outages — coverage drift is
          # signal, not a release blocker.
          fail_ci_if_error: false
